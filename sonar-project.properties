sonar.projectKey=ai-tutor
sonar.projectName=AI Tutor

# Focus on the root; SonarQube will find Go and Frontend files automatically
sonar.sources=.

# Cleaned up exclusions using standard forward slashes
sonar.exclusions=**/node_modules/**,**/frontend/dist/**,**/build/**,**/.git/**,**/.github/**,**/.vscode/**,**/.windsurf/**,**/.agents/**,**/.mimocode/**,**/.scannerwork/**,**/.sonarlint/**,**/wailsjs/**,**/graphify-out/**,**/doc/**,**/todo/**,**/dev_data/**,**/uploads/**,**/*.dll,**/*.exe,**/*.db,**/asset/model_int8.onnx

# Coverage setups look perfect (even if you don't run them today, they are ready for later)
sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.sourceEncoding=UTF-8