<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Tutor - Architecture Dependency Graph</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; height: 100vh; overflow: hidden; }
  #graph { flex: 1; }
  #sidebar { width: 320px; background: #1a1a2e; border-left: 1px solid #2a2a4e; display: flex; flex-direction: column; overflow: hidden; }
  #search-wrap { padding: 12px; border-bottom: 1px solid #2a2a4e; }
  #search { width: 100%; background: #0f0f1a; border: 1px solid #3a3a5e; color: #e0e0e0; padding: 7px 10px; border-radius: 6px; font-size: 13px; outline: none; }
  #search:focus { border-color: #4E79A7; }
  #info-panel { padding: 14px; border-bottom: 1px solid #2a2a4e; min-height: 160px; }
  #info-panel h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  #info-content { font-size: 13px; color: #ccc; line-height: 1.6; }
  #legend-wrap { flex: 1; overflow-y: auto; padding: 12px; }
  #legend-wrap h3 { font-size: 13px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin: 4px 0; border-radius: 4px; font-size: 12px; background: #0f0f1a; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { flex: 1; }
  .legend-count { color: #666; font-size: 11px; }
  #stats { padding: 10px 14px; border-top: 1px solid #2a2a4e; font-size: 11px; color: #555; }
  #title-bar { padding: 12px 14px; border-bottom: 1px solid #2a2a4e; background: #16162a; }
  #title-bar h1 { font-size: 16px; color: #fff; margin-bottom: 4px; }
  #title-bar p { font-size: 12px; color: #888; }
</style>
</head>
<body>
<div id="graph"></div>
<div id="sidebar">
  <div id="title-bar">
    <h1>Architecture Dependencies</h1>
    <p>Queue-centric AI Tutor system</p>
  </div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search nodes..." autocomplete="off">
  </div>
  <div id="info-panel">
    <h3>Component Info</h3>
    <div id="info-content"><span class="empty">Click a node to inspect</span></div>
  </div>
  <div id="legend-wrap">
    <h3>Classification</h3>
    <div class="legend-item"><span class="legend-dot" style="background:#4E79A7"></span><span class="legend-label">CORE - Production Ready</span></div>
    <div class="legend-item"><span class="legend-dot" style="background:#59A14F"></span><span class="legend-label">SUPPORTING - Active</span></div>
    <div class="legend-item"><span class="legend-dot" style="background:#F28E2B"></span><span class="legend-label">TRANSITIONAL - In Migration</span></div>
    <div class="legend-item"><span class="legend-dot" style="background:#E15759"></span><span class="legend-label">PREMATURE - Ghost Architecture</span></div>
    <div class="legend-item"><span class="legend-dot" style="background:#76B7B2"></span><span class="legend-label">LEGACY - Should Evaluate</span></div>
  </div>
  <div id="stats">Dependency graph for cleanup planning</div>
</div>
<script>
// AI Tutor Architecture Dependency Graph
// Classification: CORE, SUPPORTING, TRANSITIONAL, PREMATURE, LEGACY

const nodes = new vis.DataSet([
  // CORE - Study Queue System
  {id: "study_queue", label: "study_queue", color: "#4E79A7", group: "CORE", size: 25, title: "Central queue table - orchestration backbone"},
  {id: "study_queue_repo", label: "study_queue_repo.go", color: "#4E79A7", group: "CORE", size: 20, title: "Queue repository - inserts, activates, completes tasks"},
  {id: "scheduler_service", label: "scheduler/service.go", color: "#4E79A7", group: "CORE", size: 18, title: "Deterministic task generation"},
  {id: "scheduler_fsrs", label: "scheduler/fsrs.go", color: "#4E79A7", group: "CORE", size: 16, title: "Pure FSRS algorithm - interval calculation only"},
  {id: "notebooks_repo", label: "notebooks_repo.go", color: "#4E79A7", group: "CORE", size: 18, title: "Notebook CRUD operations"},
  {id: "flashcard_repo", label: "flashcard_repo.go", color: "#4E79A7", group: "CORE", size: 16, title: "Flashcard persistence"},
  {id: "quiz_repo", label: "quiz_repo.go", color: "#4E79A7", group: "CORE", size: 16, title: "Quiz question management"},
  {id: "fsrs_review_log_repo", label: "fsrs_review_log_repo.go", color: "#4E79A7", group: "CORE", size: 14, title: "Review audit trail"},
  {id: "topics_repo", label: "topics_repo.go", color: "#4E79A7", group: "CORE", size: 14, title: "Topic management"},
  {id: "reread_attempts_repo", label: "reread_attempts_repo.go", color: "#4E79A7", group: "CORE", size: 12, title: "Remediation tracking"},
  
  // CORE - Study Services
  {id: "study_service", label: "study/service.go", color: "#4E79A7", group: "CORE", size: 18, title: "Quiz/flashcard generation"},
  {id: "study_reader", label: "study/reader.go", color: "#4E79A7", group: "CORE", size: 16, title: "Reading completion flow"},
  {id: "study_quiz", label: "study/quiz.go", color: "#4E79A7", group: "CORE", size: 14, title: "Quiz generation/scoring"},
  {id: "study_flashcard", label: "study/flashcard.go", color: "#4E79A7", group: "CORE", size: 14, title: "Flashcard management"},
  {id: "notebook_ingestion", label: "notebook/ingestion.go", color: "#4E79A7", group: "CORE", size: 16, title: "Content processing"},

  // SUPPORTING
  {id: "rag_pipeline", label: "rag/pipeline.go", color: "#59A14F", group: "SUPPORTING", size: 14, title: "RAG retrieval"},
  {id: "embeddings_onnx", label: "embeddings/onnx.go", color: "#59A14F", group: "SUPPORTING", size: 12, title: "Local embedding model"},
  {id: "notebook_syllabus", label: "notebook/syllabus.go", color: "#59A14F", group: "SUPPORTING", size: 12, title: "Chapter extraction"},
  {id: "notebook_upload", label: "notebook/upload.go", color: "#59A14F", group: "SUPPORTING", size: 12, title: "File upload"},
  {id: "study_examiner", label: "study/examiner.go", color: "#59A14F", group: "SUPPORTING", size: 12, title: "Assessment system"},
  {id: "study_socratic", label: "study/socratic.go", color: "#59A14F", group: "SUPPORTING", size: 12, title: "Socratic tutoring"},
  {id: "reader_bundle_repo", label: "reader_bundle_repo.go", color: "#59A14F", group: "SUPPORTING", size: 10, title: "Reader context loading"},
  {id: "assessment_repo", label: "assessment_repo.go", color: "#59A14F", group: "SUPPORTING", size: 10, title: "Written assessment"},

  // TRANSITIONAL
  {id: "app_gettodayplan", label: "GetTodayPlan()", color: "#F28E2B", group: "TRANSITIONAL", size: 14, title: "Hybrid: scheduler + queue merge"},
  {id: "marathon_quiz", label: "GenerateMarathonQuiz()", color: "#F28E2B", group: "TRANSITIONAL", size: 12, title: "Legacy comprehensive mode"},
  {id: "marathon_flashcards", label: "GenerateMarathonFlashcards()", color: "#F28E2B", group: "TRANSITIONAL", size: 12, title: "Legacy comprehensive mode"},
  {id: "comprehensive_exam", label: "GenerateComprehensiveExam()", color: "#F28E2B", group: "TRANSITIONAL", size: 12, title: "Legacy comprehensive mode"},
  {id: "assessment_fsrs", label: "assessment_fsrs table", color: "#F28E2B", group: "TRANSITIONAL", size: 10, title: "Written assessment FSRS state"},

  // PREMATURE - Ghost Architecture (HIGH RISK)
  {id: "notebook_orchestration", label: "notebook/orchestration.go", color: "#E15759", group: "PREMATURE", size: 14, title: "NO CLEAR CONSUMER - Investigate for removal"},
  {id: "notebook_orchestration_repo", label: "notebook_orchestration_repo.go", color: "#E15759", group: "PREMATURE", size: 12, title: "ORPHANED REPO - Investigate for removal"},

  // LEGACY
  {id: "marathon_repo", label: "marathon_repo.go", color: "#76B7B2", group: "LEGACY", size: 12, title: "Replaced by studyService"},
  {id: "notebook_topic_tree_repo", label: "notebook_topic_tree_repo.go", color: "#76B7B2", group: "LEGACY", size: 12, title: "Replaced by notebooks_repo"},

  // Frontend
  {id: "app_api", label: "appApi.js", color: "#4E79A7", group: "CORE", size: 14, title: "Wails bridge - frontend consumer"},
  {id: "dashboard_vue", label: "Dashboard.vue", color: "#4E79A7", group: "CORE", size: 12, title: "Main queue UI"},
  {id: "reader_vue", label: "Reader.vue", color: "#4E79A7", group: "CORE", size: 12, title: "Reading interface"},
  {id: "quiz_vue", label: "Quiz.vue", color: "#4E79A7", group: "CORE", size: 12, title: "Quiz interface"},
  {id: "flashcards_vue", label: "Flashcards.vue", color: "#4E79A7", group: "CORE", size: 12, title: "Flashcard interface"},
]);

const edges = new vis.DataSet([
  // Queue flow edges
  {from: "study_queue", to: "study_queue_repo", title: "table access"},
  {from: "study_queue_repo", to: "app_gettodayplan", title: "queue query"},
  {from: "study_queue_repo", to: "app_api", title: "Wails binding"},
  {from: "app_api", to: "dashboard_vue", title: "consumed by"},
  
  // Service dependencies
  {from: "scheduler_service", to: "scheduler_fsrs", title: "uses FSRS algorithm"},
  {from: "scheduler_service", to: "study_queue_repo", title: "inserts tasks"},
  {from: "study_service", to: "quiz_repo", title: "quiz operations"},
  {from: "study_service", to: "flashcard_repo", title: "flashcard operations"},
  {from: "study_service", to: "study_queue_repo", title: "task lifecycle"},
  {from: "study_reader", to: "notebooks_repo", title: "content access"},
  {from: "study_reader", to: "study_queue_repo", title: "completes tasks"},
  {from: "study_quiz", to: "quiz_repo", title: "question CRUD"},
  {from: "study_flashcard", to: "flashcard_repo", title: "card CRUD"},
  {from: "study_flashcard", to: "scheduler_fsrs", title: "interval calculation"},
  
  // Notebook flow
  {from: "notebook_ingestion", to: "notebooks_repo", title: "persists notebooks"},
  {from: "notebook_ingestion", to: "topics_repo", title: "creates topics"},
  {from: "notebook_syllabus", to: "notebook_ingestion", title: "chapter extraction"},
  {from: "notebook_upload", to: "notebook_ingestion", title: "triggers ingestion"},
  
  // Supporting services
  {from: "rag_pipeline", to: "embeddings_onnx", title: "embedding queries"},
  {from: "rag_pipeline", to: "notebooks_repo", title: "content retrieval"},
  
  // PREMATURE connections (no real consumers)
  {from: "notebook_orchestration", to: "notebooks_repo", title: "UNUSED - no consumer"},
  {from: "notebook_orchestration_repo", to: "notebooks_repo", title: "ORPHANED"},

  // LEGACY connections
  {from: "marathon_repo", to: "study_service", title: "REPLACED"},
  {from: "notebook_topic_tree_repo", to: "notebooks_repo", title: "REPLACED"},
  
  // TRANSITIONAL
  {from: "app_gettodayplan", to: "scheduler_service", title: "builds plan"},
  {from: "app_gettodayplan", to: "study_queue_repo", title: "merges queue"},
  {from: "marathon_quiz", to: "quiz_repo", title: "alternative flow"},
  {from: "marathon_flashcards", to: "flashcard_repo", title: "alternative flow"},
  {from: "comprehensive_exam", to: "study_examiner", title: "alternative flow"},
]);

const container = document.getElementById('graph');
const data = { nodes, edges };
const options = {
  nodes: { shape: 'dot', font: { size: 12, color: '#e0e0e0' }, borderWidth: 2, shadow: true },
  edges: { width: 1.5, color: { color: '#3a3a5e', highlight: '#4E79A7' }, smooth: { type: 'continuous' } },
  physics: { stabilization: { iterations: 100 }, barnesHut: { gravitationalConstant: -3000, springConstant: 0.04 } },
  interaction: { hover: true, tooltipDelay: 200, navigationButtons: true }
};
const network = new vis.Network(container, data, options);

network.on("click", function(params) {
  const content = document.getElementById('info-content');
  if (params.nodes.length > 0) {
    const node = nodes.get(params.nodes[0]);
    content.innerHTML = `
      <div class="field"><b>Name:</b> ${node.label}</div>
      <div class="field"><b>Group:</b> ${node.group}</div>
      <div class="field"><b>Description:</b> ${node.title || 'N/A'}</div>
    `;
  } else {
    content.innerHTML = '<span class="empty">Click a node to inspect</span>';
  }
});
</script>
</body>
</html>
