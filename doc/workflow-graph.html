<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Tutor - Queue Workflow Graph</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; height: 100vh; overflow: hidden; }
  #graph { flex: 1; }
  #sidebar { width: 320px; background: #1a1a2e; border-left: 1px solid #2a2a4e; display: flex; flex-direction: column; overflow: hidden; }
  #title-bar { padding: 12px 14px; border-bottom: 1px solid #2a2a4e; background: #16162a; }
  #title-bar h1 { font-size: 16px; color: #fff; margin-bottom: 4px; }
  #title-bar p { font-size: 12px; color: #888; }
  #workflow-panel { padding: 14px; border-bottom: 1px solid #2a2a4e; }
  #workflow-panel h3 { font-size: 13px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; }
  .workflow-item { padding: 8px 10px; margin: 6px 0; background: #0f0f1a; border-radius: 6px; border-left: 3px solid #4E79A7; font-size: 12px; cursor: pointer; }
  .workflow-item:hover { background: #2a2a4e; }
  .workflow-item.reading { border-color: #59A14F; }
  .workflow-item.quiz { border-color: #F28E2B; }
  .workflow-item.flashcard { border-color: #76B7B2; }
  .workflow-item.reread { border-color: #E15759; }
  #legend-wrap { flex: 1; overflow-y: auto; padding: 14px; }
  #legend-wrap h3 { font-size: 13px; color: #aaa; margin-bottom: 10px; text-transform: uppercase; }
  .legend-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin: 4px 0; border-radius: 4px; font-size: 12px; background: #0f0f1a; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { flex: 1; }
  #stats { padding: 10px 14px; border-top: 1px solid #2a2a4e; font-size: 11px; color: #555; }
</style>
</head>
<body>
<div id="graph"></div>
<div id="sidebar">
  <div id="title-bar">
    <h1>Queue Workflows</h1>
    <p>Deterministic task lifecycle</p>
  </div>
  <div id="workflow-panel">
    <h3>Workflows</h3>
    <div class="workflow-item reading" onclick="highlightWorkflow('reading')">📖 READING → QUIZ</div>
    <div class="workflow-item quiz" onclick="highlightWorkflow('quiz')">❓ QUIZ → REREAD/NEXT</div>
    <div class="workflow-item flashcard" onclick="highlightWorkflow('flashcard')">🃏 FLASHCARD → REVIEW</div>
    <div class="workflow-item reread" onclick="highlightWorkflow('reread')">🔄 REREAD remediation</div>
  </div>
  <div id="legend-wrap">
    <h3>Task States</h3>
    <div class="legend-item"><span class="legend-dot" style="background:#59A14F"></span><span class="legend-label">PENDING - Queued</span></div>
    <div class="legend-item"><span class="legend-dot" style="background:#4E79A7"></span><span class="legend-label">ACTIVE - In Progress</span></div>
    <div class="legend-item"><span class="legend-dot" style="background:#F28E2B"></span><span class="legend-label">COMPLETED - Success</span></div>
    <div class="legend-item"><span class="legend-dot" style="background:#E15759"></span><span class="legend-label">SKIPPED/FAILED</span></div>
    <h3 style="margin-top:16px">Follow-up Inserts</h3>
    <div class="legend-item"><span class="legend-dot" style="background:#76B7B2"></span><span class="legend-label">Auto-inserted task</span></div>
  </div>
  <div id="stats">Queue lifecycle visualization</div>
</div>
<script>
const nodes = new vis.DataSet([
  // READING workflow
  {id: "queue_pending_reading", label: "PENDING\nREADING", color: "#59A14F", shape: "box", size: 18, font: {size: 11}, group: "PENDING"},
  {id: "initialize_session", label: "InitializeReadingSession()", color: "#4E79A7", size: 12, group: "ACTION"},
  {id: "queue_active_reading", label: "ACTIVE\nREADING", color: "#4E79A7", shape: "box", size: 18, font: {size: 11}, group: "ACTIVE"},
  {id: "complete_reading", label: "CompleteReading()", color: "#4E79A7", size: 12, group: "ACTION"},
  {id: "insert_quiz", label: "QUIZ follow-up\n(auto-inserted)", color: "#76B7B2", shape: "box", size: 14, font: {size: 10}, group: "INSERT"},
  {id: "queue_completed_reading", label: "COMPLETED\nREADING", color: "#F28E2B", shape: "box", size: 16, font: {size: 11}, group: "COMPLETED"},

  // QUIZ workflow
  {id: "queue_pending_quiz", label: "PENDING\nQUIZ", color: "#59A14F", shape: "box", size: 18, font: {size: 11}, group: "PENDING"},
  {id: "submit_quiz", label: "SubmitQuizAttempt()", color: "#4E79A7", size: 12, group: "ACTION"},
  {id: "quiz_passed", label: "Score ≥ threshold", color: "#59A14F", size: 12, font: {size: 10}, group: "DECISION"},
  {id: "quiz_failed", label: "Score < threshold", color: "#E15759", size: 12, font: {size: 10}, group: "DECISION"},
  {id: "insert_reread", label: "REREAD follow-up\n(auto-inserted)", color: "#76B7B2", shape: "box", size: 14, font: {size: 10}, group: "INSERT"},
  {id: "queue_completed_quiz", label: "COMPLETED\nQUIZ", color: "#F28E2B", shape: "box", size: 16, font: {size: 11}, group: "COMPLETED"},

  // FLASHCARD workflow
  {id: "fsrs_cards", label: "fsrs_cards\ntable", color: "#4E79A7", size: 14, group: "DATA"},
  {id: "generate_review", label: "GenerateReviewTasks()", color: "#4E79A7", size: 12, group: "ACTION"},
  {id: "queue_pending_review", label: "PENDING\nFLASHCARD_REVIEW", color: "#59A14F", shape: "box", size: 16, font: {size: 10}, group: "PENDING"},
  {id: "queue_active_review", label: "ACTIVE\nFLASHCARD_REVIEW", color: "#4E79A7", shape: "box", size: 16, font: {size: 10}, group: "ACTIVE"},
  {id: "record_review", label: "RecordFlashcardReview()", color: "#4E79A7", size: 12, group: "ACTION"},
  {id: "fsrs_algorithm", label: "FSRS algorithm\n(scheduler/fsrs.go)", color: "#59A14F", size: 12, font: {size: 10}, group: "ALGORITHM"},
  {id: "update_due_at", label: "Update due_at\n(schedule next)", color: "#76B7B2", size: 12, group: "INSERT"},
  {id: "queue_completed_review", label: "COMPLETED\nFLASHCARD_REVIEW", color: "#F28E2B", shape: "box", size: 16, font: {size: 10}, group: "COMPLETED"},

  // REREAD workflow
  {id: "queue_pending_reread", label: "PENDING\nREREAD", color: "#59A14F", shape: "box", size: 18, font: {size: 11}, group: "PENDING"},
  {id: "reread_count", label: "reread_attempts\ncounter", color: "#4E79A7", size: 12, group: "DATA"},
  {id: "max_retries", label: "≥ 3 retries?", color: "#E15759", size: 12, font: {size: 10}, group: "DECISION"},
  {id: "manual_review", label: "Manual review\nrecommended", color: "#E15759", size: 12, font: {size: 10}, group: "END"},
  {id: "queue_completed_reread", label: "COMPLETED\nREREAD", color: "#F28E2B", shape: "box", size: 16, font: {size: 11}, group: "COMPLETED"},
]);

const edges = new vis.DataSet([
  // READING flow
  {from: "queue_pending_reading", to: "initialize_session", title: "user opens task"},
  {from: "initialize_session", to: "queue_active_reading", title: "activate"},
  {from: "queue_active_reading", to: "complete_reading", title: "user completes"},
  {from: "complete_reading", to: "insert_quiz", title: "auto-insert QUIZ follow-up"},
  {from: "complete_reading", to: "queue_completed_reading", title: "mark completed"},

  // QUIZ flow
  {from: "queue_pending_quiz", to: "submit_quiz", title: "user submits answers"},
  {from: "submit_quiz", to: "quiz_passed", title: "score check"},
  {from: "submit_quiz", to: "quiz_failed", title: "score check"},
  {from: "quiz_passed", to: "queue_completed_quiz", title: "proceed"},
  {from: "quiz_failed", to: "insert_reread", title: "auto-insert REREAD"},
  {from: "quiz_failed", to: "queue_completed_quiz", title: "also completed"},

  // FLASHCARD flow
  {from: "fsrs_cards", to: "generate_review", title: "query due cards"},
  {from: "generate_review", to: "queue_pending_review", title: "insert FLASHCARD_REVIEW tasks"},
  {from: "queue_pending_review", to: "queue_active_review", title: "user opens"},
  {from: "queue_active_review", to: "record_review", title: "user reviews card"},
  {from: "record_review", to: "fsrs_algorithm", title: "calculate next interval"},
  {from: "fsrs_algorithm", to: "update_due_at", title: "update card state"},
  {from: "update_due_at", to: "queue_completed_review", title: "complete task"},

  // REREAD flow
  {from: "queue_pending_reread", to: "complete_reading", title: "re-read content"},
  {from: "complete_reading", to: "reread_count", title: "increment counter"},
  {from: "reread_count", to: "max_retries", title: "check count"},
  {from: "max_retries", to: "manual_review", title: "yes - too many retries"},
  {from: "max_retries", to: "queue_completed_reread", title: "no - retry quiz"},
  {from: "queue_completed_reread", to: "queue_pending_quiz", title: "retake quiz"},
]);

const container = document.getElementById('graph');
const data = { nodes, edges };
const options = {
  nodes: { shape: 'dot', font: { color: '#e0e0e0' }, borderWidth: 2, shadow: true },
  edges: { width: 2, color: { color: '#3a3a5e', highlight: '#4E79A7' }, arrows: 'to', smooth: { type: 'curvedCW', roundness: 0.2 } },
  physics: { stabilization: { iterations: 150 }, barnesHut: { gravitationalConstant: -2000, springConstant: 0.05 } },
  layout: { improvedLayout: true, hierarchical: { enabled: true, direction: 'LR', sortMethod: 'directed' } },
  interaction: { hover: true, navigationButtons: true }
};
const network = new vis.Network(container, data, options);

function highlightWorkflow(type) {
  const highlightNodes = {
    reading: ["queue_pending_reading", "initialize_session", "queue_active_reading", "complete_reading", "insert_quiz", "queue_completed_reading"],
    quiz: ["queue_pending_quiz", "submit_quiz", "quiz_passed", "quiz_failed", "insert_reread", "queue_completed_quiz"],
    flashcard: ["fsrs_cards", "generate_review", "queue_pending_review", "queue_active_review", "record_review", "fsrs_algorithm", "update_due_at", "queue_completed_review"],
    reread: ["queue_pending_reread", "complete_reading", "reread_count", "max_retries", "manual_review", "queue_completed_reread"]
  };
  
  const nodesToHighlight = highlightNodes[type] || [];
  nodes.forEach(function(node) {
    nodes.update({id: node.id, color: {background: node.color, border: node.color}});
  });
}
</script>
</body>
</html>
